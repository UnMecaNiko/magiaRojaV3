# Configuración GRBL vigente — CNC Magia Roja v3
# ⏳ PENDIENTE: la controladora v3 aún no está configurada (fase electrónica en curso).
# Cuando exista la primera config: llenar valores, snapshot en historico/ y anotar CHANGELOG.md.

maquina: magia-roja-v3
fecha: null            # fecha del último cambio aplicado
version_grbl: null     # ⏳ PENDIENTE: versión de firmware a instalar

# Microstepping decidido: 1/8 en los tres ejes — ver ../drivers/microstepping.yaml.
# Falta el avance mecánico (paso de tornillo/polea) de cada eje para calcular $100/$101/$102.

# Parámetros $$ de GRBL, anotados. Referencia oficial:
# https://github.com/gnea/grbl/blob/master/doc/markdown/settings.md
parametros:
  $0:   {valor: null, nombre: "Step pulse (µs)"}
  $1:   {valor: null, nombre: "Step idle delay (ms)"}
  $20:  {valor: 0, nombre: "Soft limits enable", nota: "Apagado — ver D-0010. GRBL no permite soft limits por eje y Z no tiene fin de carrera; se prioriza no bloquear a Z en un sentido arbitrario. ⏳ PENDIENTE: instalar fin de carrera en Z y reevaluar reactivarlo."}
  $21:  {valor: 1, nombre: "Hard limits enable", nota: "Global a los 3 ejes; Z no tiene switch — pin en pull-up interno, sin puente necesario. Ver D-0009/D-0010."}
  $22:  {valor: 1, nombre: "Homing cycle enable", nota: "Habilitado por X/Y (únicos ejes con switch). Ver D-0009 (vigente en este punto)."}
  $30:  {valor: null, nombre: "Max spindle/laser speed (S-value máx)"}
  $31:  {valor: null, nombre: "Min spindle/laser speed"}
  $32:  {valor: null, nombre: "Laser mode (1=on)", nota: "Activar para el K30; revisar al conmutar a fresado"}
  $100: {valor: 200, nombre: "Pasos/mm X", nota: "Deducido, no medido: mismo tornillo que v2 (8mm/rev) + 1/8 micropaso (1600 pasos efectivos/rev). Ver parametros/drivers/microstepping.yaml. ⏳ PENDIENTE validar sin pérdida de pasos."}
  $101: {valor: null, nombre: "Pasos/mm Y"}
  $102: {valor: null, nombre: "Pasos/mm Z", nota: "Nuevo en v3 — depende del husillo del Z"}
  $110: {valor: null, nombre: "Velocidad máx X (mm/min)"}
  $111: {valor: null, nombre: "Velocidad máx Y (mm/min)"}
  $112: {valor: null, nombre: "Velocidad máx Z (mm/min)"}
  $120: {valor: null, nombre: "Aceleración X (mm/s²)"}
  $121: {valor: null, nombre: "Aceleración Y (mm/s²)"}
  $122: {valor: null, nombre: "Aceleración Z (mm/s²)"}
  $130: {valor: null, nombre: "Recorrido máx X (mm)", nota: "⏳ área de trabajo por medir"}
  $131: {valor: null, nombre: "Recorrido máx Y (mm)"}
  $132: {valor: null, nombre: "Recorrido máx Z (mm)", nota: "⏳ PENDIENTE: recorrido real de Z. Ya no se usa un valor artificial (ver D-0010) — con $20=0 este valor no se evalúa por ahora; se medirá cuando se instale el fin de carrera de Z."}
