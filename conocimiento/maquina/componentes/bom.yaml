# Lista de materiales (BOM) — CNC Magia Roja v3
# Formato: YAML (regla del repo: datos en YAML, narrativa en Markdown)
# Los componentes con ficha detallada enlazan a fichas/
# estado: instalado | en-integracion | pendiente | por-definir

version_maquina: magia-roja-v3
actualizado: "2026-07-04"

componentes:
  - id: laser-k30
    nombre: Laser Tree K30
    categoria: herramienta
    descripcion: Módulo láser 30W ópticos, 450 nm, air assist integrado
    cantidad: 1
    estado: en-integracion
    ficha: fichas/laser-tree-k30.md
    proveedor: null   # ⏳ PENDIENTE: dónde se compró
    notas: Incluye fuente propia 24V/5A

  - id: fuente-12v
    nombre: Fuente de alimentación 12V 10A
    categoria: electrica
    descripcion: Riel principal para control, motores y ventilación
    cantidad: 1
    estado: instalado
    proveedor: null   # ⏳ PENDIENTE

  - id: arduino-cnc-shield
    nombre: Arduino + CNC Shield
    categoria: electronica
    descripcion: Controladora GRBL (plataforma de la línea desde v1)
    cantidad: 1
    estado: en-integracion
    notas: "⏳ PENDIENTE: modelo exacto de Arduino y versión de shield"

  - id: drivers-steppers
    nombre: DRV8825
    categoria: electronica
    descripcion: Drivers de motores paso a paso (Rsense 0.1 Ω, marcado "R100", confirmado)
    cantidad: 3   # X, Y, Z — ⏳ confirmar si Y es dual como en v1 (serían 4)
    estado: instalado
    ficha: fichas/driver-drv8825.md
    notas: "Modelo confirmado, ver decisiones/D-0007-drivers-drv8825.md. Calibración de corriente: parametros/drivers/calibracion-corriente.yaml"

  - id: nema17-x
    nombre: Motor NEMA 17 (eje X)
    categoria: movimiento
    cantidad: 1
    estado: instalado
    ficha: fichas/motor-nema17.md
    notas: "1.7 A nominal, 0.45 Nm"
  - id: nema17-y
    nombre: Motor NEMA 17 (eje Y)
    categoria: movimiento
    cantidad: 1   # ⏳ PENDIENTE: ¿Y dual como en v1?
    estado: instalado
    ficha: fichas/motor-nema17.md
    notas: "1.7 A nominal, 0.45 Nm — mismo motor que X"
  - id: nema17-z
    nombre: Motor NEMA 17 (eje Z)
    categoria: movimiento
    cantidad: 1
    estado: instalado
    ficha: fichas/motor-nema17.md
    notas: "Nuevo en v3 — eje Z motorizado. 2 A nominal, 59 Ncm"

  - id: motor-fresado
    nombre: Motor de fresado (motor tool)
    categoria: herramienta
    descripcion: Cabezal intercambiable para fresado/grabado
    cantidad: 1
    estado: por-definir
    notas: Modelo no prioritario por ahora (decisión 2026-07)

